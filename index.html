<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDOKU — Solo & Multijoueur</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home" class="screen active">
        <div class="home-grid-bg"></div>
        <div class="home-content">
            <div class="logo-area">
                <span class="logo-tag">★ Jeu de logique</span>
                <span class="logo">SU<span>DO</span>KU</span>
                <div class="logo-sub">Solo · Multijoueur · 1v1</div>
            </div>
            <div class="mode-cards">
                <div class="mode-card solo" id="btnSolo">
                    <span class="mode-icon">🧩</span>
                    <div class="mode-title">Solo</div>
                    <div class="mode-desc">Joue à ton rythme.</div>
                </div>
                <div class="mode-card multi" id="btnMulti">
                    <span class="mode-icon">⚡</span>
                    <div class="mode-title">1v1</div>
                    <div class="mode-desc">Affronte un adversaire en temps réel.</div>
                </div>
                <div class="diff-panel" id="diffPanel">
                    <div class="diff-label">Choisir la difficulté</div>
                    <div class="diff-buttons">
                        <button class="diff-btn easy" data-diff="easy">Facile</button>
                        <button class="diff-btn medium" data-diff="medium">Moyen</button>
                        <button class="diff-btn hard" data-diff="hard">Difficile</button>
                    </div>
                </div>
                <div class="multi-panel" id="multiPanel">
                    <div class="mp-options">
                        <button class="mp-btn" id="btnCreateRoom">🎲 Créer</button>
                        <button class="mp-btn" id="btnJoinRoom">🔗 Rejoindre</button>
                    </div>
                    <div class="room-input-area" id="joinArea">
                        <input class="code-input" id="joinCodeInput" placeholder="CODE" maxlength="6">
                        <button class="join-btn" id="btnConfirmJoin">Entrer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lobby" class="screen">
        <div class="lobby-box">
            <div class="lobby-title">SALON</div>
            <div class="room-code-display">
                <div class="rcd-code" id="lobbyCode">——</div>
            </div>
            <div class="lobby-players">
                <div class="player-slot filled" id="slot1"><div class="ps-name">Toi</div></div>
                <div class="player-slot waiting" id="slot2"><div class="ps-name">Attente...</div></div>
            </div>
            <button class="lobby-start-btn" id="lobbyStartBtn">▶ LANCER</button>
            <div class="back-link" onclick="ui.goHome()">← Retour</div>
        </div>
    </div>

    <div id="game" class="screen">
        <div class="game-header">
            <div class="game-logo">SUDOKU</div>
            <div class="game-meta">
                <span class="difficulty-badge" id="diffBadge">Medium</span>
                <div class="timer-display" id="timerDisplay">00:00</div>
            </div>
        </div>
        <div class="mp-bar" id="mpBar">
            <div class="mp-player self">
                <div class="mp-player-name"><span>Toi</span><span id="selfPct">0%</span></div>
                <div class="mp-progress"><div class="mp-progress-fill" id="selfFill"></div></div>
            </div>
            <div class="mp-vs">VS</div>
            <div class="mp-player opponent">
                <div class="mp-player-name"><span>Adversaire</span><span id="opponentPct">0%</span></div>
                <div class="mp-progress"><div class="mp-progress-fill" id="opponentFill"></div></div>
            </div>
        </div>
        <div class="sudoku-board" id="sudokuBoard"></div>
        <div class="numpad" id="numpad"></div>
        <div class="game-controls">
            <button class="ctrl-btn" id="btnUndo">↩ Annuler</button>
            <button class="ctrl-btn" id="btnErase">⌫ Effacer</button>
            <button class="ctrl-btn note-mode" id="noteBtn">📝 Notes</button>
            <button class="ctrl-btn" id="btnHint">💡 Indice</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-box">
            <span class="overlay-emoji" id="overlayEmoji">🎉</span>
            <div class="overlay-title" id="overlayTitle">VICTOIRE !</div>
            <div class="overlay-stats">
                <div class="ostat"><span class="ostat-val" id="oTime">--:--</span><div class="ostat-label">Temps</div></div>
                <div class="ostat"><span class="ostat-val" id="oErrors">0</span><div class="ostat-label">Erreurs</div></div>
            </div>
            <div class="overlay-actions">
                <button class="ov-btn" onclick="ui.goHome()">Menu</button>
                <button class="ov-btn primary" id="overlayReplayBtn">Rejouer</button>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
