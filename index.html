<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
    <div class="home-content">
        <div class="logo-area">
            <span class="logo">Sudoku</span>
        </div>
        <div class="mode-cards">
            <div class="mode-card solo" onclick="ui.togglePanel('diffPanel')">
                <div class="mode-title">Solo</div>
            </div>
            <div class="mode-card multi" onclick="ui.showMultiWip()">
                <div class="mode-title">1v1</div>
            </div>
            <div class="diff-panel" id="diffPanel">
                <div class="diff-buttons">
                    <button class="diff-btn easy"   onclick="ui.startGame('solo','easy')">Facile</button>
                    <button class="diff-btn medium" onclick="ui.startGame('solo','medium')">Moyen</button>
                    <button class="diff-btn hard"   onclick="ui.startGame('solo','hard')">Difficile</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <div class="game-header">
        <div class="errors-display">
            Erreurs : <span id="currentErrors">0</span>
        </div>
        <span class="difficulty-badge" id="diffBadge"></span>
        <div class="timer-display" id="timerDisplay">00:00</div>
    </div>

    <div class="sudoku-board" id="sudokuBoard"></div>
    <div class="numpad" id="numpad"></div>

    <div class="game-controls">
        <button class="ctrl-btn" onclick="ui.goHome()">Menu</button>
    </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-box">
        <div class="overlay-title" id="overlayTitle">Terminé</div>
        <div class="overlay-stats">
            <div class="ostat">
                <span class="ostat-val" id="oTime">--:--</span>
                <div class="ostat-label">Temps</div>
            </div>
            <div class="ostat">
                <span class="ostat-val" id="oErrors">0</span>
                <div class="ostat-label">Erreurs</div>
            </div>
        </div>
        <div class="overlay-actions">
            <button class="ov-btn" onclick="ui.goHome()">Menu</button>
            <button class="ov-btn primary" onclick="ui.replay()">Rejouer</button>
        </div>
    </div>
</div>

<!-- WIP OVERLAY -->
<div class="overlay" id="wipOverlay">
    <div class="overlay-box">
        <div class="overlay-title">Bientôt disponible</div>
        <div class="overlay-sub">Le mode multijoueur est en cours d'implémentation.</div>
        <div class="overlay-actions">
            <button class="ov-btn primary" onclick="document.getElementById('wipOverlay').classList.remove('show')">Retour</button>
        </div>
    </div>
</div>

<script src="js/engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
